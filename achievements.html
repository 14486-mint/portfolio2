<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Achievements</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#FFE4EC,#FFD6E7,#FFF0F5);
    min-height:100vh;
    position: relative;
    overflow-x: hidden;
    padding-top: 100px;
}

/* --- เอฟเฟกต์ดาว 5 แฉก ประกาย และดอกไม้สีพาสเทลขยับได้ --- */
#star-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
}

.moving-star {
    position: absolute;
    animation: floatAndTwinkle linear infinite;
    opacity: 0;
    filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.6));
}

@keyframes floatAndTwinkle {
    0% {
        transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.4);
        opacity: 0;
    }
    15% {
        opacity: 0.9;
    }
    50% {
        opacity: 0.4;
        transform: translateY(50vh) translateX(30px) rotate(180deg) scale(1);
    }
    55% {
        opacity: 0.9;
    }
    90% {
        opacity: 0.9;
    }
    100% {
        transform: translateY(-10vh) translateX(70px) rotate(360deg) scale(1.4);
        opacity: 0;
    }
}
/* ---------------------------------- */

nav{
    width:100%;
    background:rgba(255,255,255,.6);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    gap:40px;
    padding:18px;
    position:fixed;
    top:0;
    z-index: 1000;
}

nav a{
    text-decoration:none;
    color:#d63384;
    font-weight:bold;
    transition:.3s;
}

nav a:hover{
    color:#ff69b4;
}

nav a.active {
    color: #ff5fa2;
    border-bottom: 2px solid #ff5fa2;
}

h1{
    text-align:center;
    color:#d63384;
    margin:40px 0;
    position: relative;
    z-index: 1;
    font-size: 36px;
    text-shadow: 0 2px 10px rgba(255, 255, 255, 0.5);
}

.container{
    width:90%;
    max-width: 1200px;
    margin:auto;
    display:grid;
    /* เปลี่ยนมาใช้การจัดกึ่งกลางเมื่อเหลือการ์ดใบเดียว */
    grid-template-columns: repeat(auto-fit, minmax(280px, 400px));
    justify-content: center;
    gap:30px;
    padding-bottom:50px;
    position: relative;
    z-index: 1;
}

.card{
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(255, 105, 180, 0.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow: 0 12px 30px rgba(255, 105, 180, 0.2);
    background: rgba(255, 255, 255, 0.8);
}

.card img{
    width:100%;
    height:260px; /* ปรับความสูงรูปขึ้นเล็กน้อยให้ดูเด่นขึ้นเมื่ออยู่เดี่ยวๆ */
    object-fit:cover;
    border-bottom: 3px solid #ffcfdf;
}

.card h2{
    color:#d63384;
    padding:20px 20px 10px;
    font-size: 22px;
}

.card p{
    color:#555;
    padding:0 20px 25px;
    line-height:1.6;
    font-size: 15px;
}
</style>

</head>

<body>

<!-- กล่องดวงดาวและดอกไม้ -->
<div id="star-container"></div>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="activities.html">Activities</a>
    <a href="achievements.html" class="active">Achievements</a>
    <a href="contact.html">Contact</a>
</nav>

<h1>My Achievements</h1>

<div class="container">

<!-- เหลือเกียรติบัตรเพียงอันเดียวตามต้องการ -->
<div class="card">
    <img src="images/certificate1.jpg" alt="Certificate 1">
    <h2>เกียรติบัตรที่ 1</h2>
    <p>
    ผ่านการอบรมThai moocพร้อมได้รับเกียรติบัตรรับรองการเข้าร่วม
       
    </p>
</div>

</div>

<!-- สคริปต์ปล่อยดาวและดอกไม้สีพาสเทล -->
<script>
function createStar() {
    const container = document.getElementById('star-container');
    if (container.children.length > 90) return;

    const star = document.createElement('div');
    const starTypes = ['⭐', '✨', '🌸'];
    star.innerText = starTypes[Math.floor(Math.random() * starTypes.length)];
    
    const colors = ['#ffb6c1', '#ffc0cb', '#ff85b3', '#ff69b4', '#ea9999', '#e0b0ff', '#b39ddb', '#ce93d8', '#fff0f5'];
    
    star.classList.add('moving-star');
    star.style.left = Math.random() * 100 + 'vw';
    star.style.fontSize = (Math.random() * 16 + 14) + 'px';
    star.style.color = colors[Math.floor(Math.random() * colors.length)];
    
    const duration = Math.random() * 5 + 6;
    star.style.animationDuration = duration + 's';
    
    container.appendChild(star);
    
    setTimeout(() => {
        star.remove();
    }, duration * 1000);
}
setInterval(createStar, 100);
</script>

</body>
</html>
