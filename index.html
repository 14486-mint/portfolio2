<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#FFE4EC,#FFD6E7,#FFF0F5);
    min-height:100vh;
}

nav{
    width:100%;
    background:rgba(255,255,255,.6);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    gap:40px;
    padding:18px;
    position:fixed;
    top:0;
}

nav a{
    text-decoration:none;
    color:#d63384;
    font-weight:bold;
    transition:.3s;
}

nav a:hover{
    color:#ff69b4;
}

.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    height:100vh;
    padding:20px;
}

.hero img{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:7px solid white;
    box-shadow:0 10px 30px rgba(255,105,180,.3);
}

.hero h1{
    margin-top:25px;
    font-size:50px;
    color:#d63384;
}

.hero h3{
    margin-top:10px;
    color:#8a4d66;
}

.hero p{
    max-width:700px;
    margin-top:20px;
    color:#555;
    line-height:1.8;
    font-size:18px;
}

.btn{
    margin-top:35px;
    padding:15px 40px;
    background:#ff85b3;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:18px;
    transition:.3s;
    box-shadow:0 8px 20px rgba(255,105,180,.3);
}

.btn:hover{
    background:#ff5fa2;
    transform:translateY(-3px);
}
</style>

</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>

    <a href="contact.html">Contact</a>
</nav>

    <img src="images/profile.jpg" alt="Profile">

    <h1>ชื่อ-นามสกุล</h1>

    <h3>Student Portfolio</h3>

    <p>
        สวัสดีค่ะ ยินดีต้อนรับสู่เว็บไซต์ Portfolio ของฉัน
        เว็บไซต์นี้จัดทำขึ้นเพื่อรวบรวมประวัติส่วนตัว ผลงาน กิจกรรม
        และความสามารถต่าง ๆ เพื่อใช้ประกอบการสมัครเข้าศึกษาต่อ

    <a href="about.html" class="btn">Explore My Portfolio</a>
