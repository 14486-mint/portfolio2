<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;

body{
    background:linear-gradient(135deg,#FFE4EC,#FFD6E7,#FFF0F5);
    min-height:100vh;
    position: relative;
    overflow-x: hidden;
}

/* --- ส่วนที่เพิ่มเข้ามา: เอฟเฟกต์ดาวหลากสีขยับได้ --- */
.star-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* ทำให้คลิกทะลุดาวได้ ไม่บังปุ่ม */
    z-index: 0;
}

.star {
    position: absolute;
    font-size: 24px;
    animation: floatStars 6s ease-in-out infinite alternate;
}

/* กำหนดตำแหน่ง สี และจังหวะการขยับของดาวแต่ละดวง */
.star:nth-child(1) { top: 15%; left: 10%; color: #ff69b4; animation-delay: 0s; }
.star:nth-child(2) { top: 25%; right: 15%; color: #ffb6c1; animation-delay: 1s; font-size: 30px; }
.star:nth-child(3) { top: 70%; left: 12%; color: #ba55d3; animation-delay: 2s; }
.star:nth-child(4) { top: 80%; right: 10%; color: #20b2aa; animation-delay: 1.5s; font-size: 28px; }
.star:nth-child(5) { top: 45%; left: 25%; color: #ffa500; animation-delay: 0.5s; }
.star:nth-child(6) { top: 60%; right: 28%; color: #9370db; animation-delay: 2.5s; }
.star:nth-child(7) { top: 10%; right: 40%; color: #ff6347; animation-delay: 1.8s; }

/* แอนิเมชันสั่งให้ดาวลอยไปมาและหมุนเล็กน้อย */
@keyframes floatStars {
    0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 0.6;
    }
    100% {
        transform: translateY(-20px) rotate(15deg) scale(1.2);
        opacity: 0.9;
    }
}
/* ------------------------------------------- */

nav{
    width:100%;
    background:rgba(255,255,255,.6);

.hero img{

.btn{

}

.btn:hover{

    transform:translateY(-3px);
}
