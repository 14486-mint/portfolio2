<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#FFE4EC,#FFD6E7,#FFF0F5);
    min-height:100vh;
    position: relative;
    overflow-x: hidden;
}

/* --- เอฟเฟกต์ดาว 5 แฉก ประกาย และดอกไม้ขยับได้ --- */
#star-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
}

.moving-star {
    position: absolute;
    animation: floatAndTwinkle linear infinite;
    opacity: 0;
    filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.6)); /* เพิ่มออร่าเรืองแสงอ่อนๆ */
}

@keyframes floatAndTwinkle {
    0% {
        transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.4);
        opacity: 0;
    }
    15% {
        opacity: 0.9;
    }
    50% {
        /* เพิ่มจังหวะกะพริบวิบวับตรงกลางทาง */
        opacity: 0.4;
        transform: translateY(50vh) translateX(30px) rotate(180deg) scale(1);
    }
    55% {
        opacity: 0.9;
    }
    90% {
        opacity: 0.9;
    }
    100% {
        transform: translateY(-10vh) translateX(70px) rotate(360deg) scale(1.4);
        opacity: 0;
    }
}
/* ---------------------------------- */

nav{
    width:100%;
    background:rgba(255,255,255,.6);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    gap:40px;
    padding:18px;
    position:fixed;
    top:0;
    z-index: 1000;
}

nav a{
    text-decoration:none;
    color:#d63384;
    font-weight:bold;
    transition:.3s;
}

nav a:hover{
    color:#ff69b4;
}

.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    height:100vh;
    padding:20px;
    position: relative;
    z-index: 1;
}

.avatar-wrapper {
    position: relative;
    width: 236px;
    height: 236px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(45deg, #ff85b3, #ffb6c1, #ba55d3, #ff69b4);
    border-radius: 50%;
    padding: 8px; 
    box-shadow: 0 12px 35px rgba(255, 105, 180, 0.4);
    animation: borderGlow 4s ease infinite alternate;
}

@keyframes borderGlow {
    0% { box-shadow: 0 12px 35px rgba(255, 105, 180, 0.4); }
    100% { box-shadow: 0 12px 45px rgba(186, 85, 211, 0.6); }
}

.hero img{
    width: 100%;
    height: 100%;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white; 
}

.hero h1{
    margin-top:25px;
    font-size:50px;
    color:#d63384;
    text-shadow: 0 2px 10px rgba(255, 255, 255, 0.5);
}

.hero h3{
    margin-top:10px;
    color:#8a4d66;
}

.hero p{
    max-width:700px;
    margin-top:20px;
    color:#555;
    line-height:1.8;
    font-size:18px;
    background: rgba(255, 255, 255, 0.4);
    padding: 10px 20px;
    border-radius: 20px;
    backdrop-filter: blur(5px);
}

.btn{
    margin-top:35px;
    padding:15px 40px;
    background:#ff85b3;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:18px;
    transition:.3s;
    box-shadow:0 8px 20px rgba(255,105,180,.3);
}

.btn:hover{
    background:#ff5fa2;
    transform:translateY(-3px);
}
</style>

</head>
<body>

<!-- กล่องดวงดาวและดอกไม้ -->
<div id="star-container"></div>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="activities.html">Activities</a>
    <a href="achievements.html">Achievements</a>
    <a href="contact.html">Contact</a>
</nav>

<section class="hero">

    <div class="avatar-wrapper">
        <img src="images/IMG_2433.jpeg">
    </div>

    <h1>ชื่อ-นามสกุล</h1>

    <h3>Student Portfolio</h3>

    <p>
        สวัสดีค่ะ ยินดีต้อนรับสู่เว็บไซต์ Portfolio ของฉัน
        เว็บไซต์นี้จัดทำขึ้นเพื่อรวบรวมประวัติส่วนตัว ผลงาน กิจกรรม
        และความสามารถต่าง ๆ เพื่อใช้ประกอบการสมัครเข้าศึกษาต่อ
    </p>

    <a href="about.html" class="btn">Welcome My Portfolio</a>

</section>

<script>
function createStar() {
    const container = document.getElementById('star-container');
    
    // ควบคุมปริมาณไอเทมบนจอไม่ให้เกิน 90 ชิ้น
    if (container.children.length > 90) return;

    const star = document.createElement('div');
    
    // เลือกเฉพาะ ดาว 5 แฉก, ประกายวิบวับ และดอกไม้ ตามที่ขอมาครับ
    const starTypes = ['⭐', '✨', '🌸'];
    star.innerText = starTypes[Math.floor(Math.random() * starTypes.length)];
    
    // ชุดสีพาสเทลหวานๆ ละมุนตา
    const colors = ['#ffb6c1', '#ffc0cb', '#ff85b3', '#ff69b4', '#ea9999', '#e0b0ff', '#b39ddb', '#ce93d8', '#fff0f5'];
    
    star.classList.add('moving-star');
    star.style.left = Math.random() * 100 + 'vw';
    star.style.fontSize = (Math.random() * 16 + 14) + 'px'; // ขนาดกำลังน่ารัก
    star.style.color = colors[Math.floor(Math.random() * colors.length)];
    
    // ตั้งค่าความเร็วในการลอยสลับกัน (6 ถึง 11 วินาที)
    const duration = Math.random() * 5 + 6;
    star.style.animationDuration = duration + 's';
    
    container.appendChild(star);
    
    setTimeout(() => {
        star.remove();
    }, duration * 1000);
}

// ปล่อยดวงดาวและดอกไม้ออกมาอย่างต่อเนื่องทุกๆ 100 มิลลิวินาที หนาแน่นสะใจแน่นอนครับ
setInterval(createStar, 100);
</script>

</body>
</html>
