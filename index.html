<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#FFE4EC,#FFD6E7,#FFF0F5);
    min-height:100vh;
    position: relative;
    overflow-x: hidden;
}

/* --- ส่วนเอฟเฟกต์ดาวขยับและเคลื่อนที่ --- */
#star-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none; /* เพื่อให้คลิกทะลุดาวไปโดนปุ่มได้ */
    z-index: 0;
}

.moving-star {
    position: absolute;
    animation: floatAndTwinkle linear infinite;
    opacity: 0;
}

@keyframes floatAndTwinkle {
    0% {
        transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.5);
        opacity: 0;
    }
    10% {
        opacity: 0.8;
    }
    90% {
        opacity: 0.8;
    }
    100% {
        transform: translateY(-10vh) translateX(50px) rotate(360deg) scale(1.2);
        opacity: 0;
    }
}
/* ---------------------------------- */

nav{
    width:100%;
    background:rgba(255,255,255,.6);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    gap:40px;
    padding:18px;
    position:fixed;
    top:0;
    z-index: 1000;
}

nav a{
    text-decoration:none;
    color:#d63384;
    font-weight:bold;
    transition:.3s;
}

nav a:hover{
    color:#ff69b4;
}

.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    height:100vh;
    padding:20px;
    position: relative;
    z-index: 1; /* ดันเนื้อหาให้อยู่เหนือดวงดาว */
}

.hero img{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:7px solid white;
    box-shadow:0 10px 30px rgba(255,105,180,.3);
}

.hero h1{
    margin-top:25px;
    font-size:50px;
    color:#d63384;
}

.hero h3{
    margin-top:10px;
    color:#8a4d66;
}

.hero p{
    max-width:700px;
    margin-top:20px;
    color:#555;
    line-height:1.8;
    font-size:18px;
}

.btn{
    margin-top:35px;
    padding:15px 40px;
    background:#ff85b3;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:18px;
    transition:.3s;
    box-shadow:0 8px 20px rgba(255,105,180,.3);
}

.btn:hover{
    background:#ff5fa2;
    transform:translateY(-3px);
}
</style>

</head>
<body>

<!-- กล่องสำหรับรองรับดวงดาวที่สร้างจาก JavaScript -->
<div id="star-container"></div>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="activities.html">Activities</a>
    <a href="achievements.html">Achievements</a>
    <a href="contact.html">Contact</a>
</nav>

<section class="hero">

    <img src="images/IMG_2433.jpeg">

    <h1>ชื่อ-นามสกุล</h1>

    <h3>Student Portfolio</h3>

    <p>
        สวัสดีค่ะ ยินดีต้อนรับสู่เว็บไซต์ Portfolio ของฉัน
        เว็บไซต์นี้จัดทำขึ้นเพื่อรวบรวมประวัติส่วนตัว ผลงาน กิจกรรม
        และความสามารถต่าง ๆ เพื่อใช้ประกอบการสมัครเข้าศึกษาต่อ
    </p>

    <a href="about.html" class="btn">Welcome My Portfolio</a>

</section>

<!-- สคริปต์สั่งให้ดาวเกิดใหม่ สุ่มสี และวิ่งขึ้นด้านบนตลอดเวลา -->
<script>
function createStar() {
    const container = document.getElementById('star-container');
    const star = document.createElement('div');
    
    // รายชื่อรูปทรงดวงดาวน่ารัก ๆ
    const starTypes = ['✦', '★', '✨', '🌸'];
    star.innerText = starTypes[Math.floor(Math.random() * starTypes.length)];
    
    // รายชื่อโทนสีพาสเทลหลากสี ให้เข้ากับธีม
    const colors = ['#ff69b4', '#ffb6c1', '#ba55d3', '#20b2aa', '#ffa500', '#9370db', '#ff85b3', '#ffc0cb'];
    
    star.classList.add('moving-star');
    
    // สุ่มตำแหน่งเริ่มต้นแนวนอน (0% ถึง 100% ของความกว้างจอ)
    star.style.left = Math.random() * 100 + 'vw';
    
    // สุ่มขนาดของดวงดาว
    star.style.fontSize = (Math.random() * 15 + 15) + 'px';
    
    // สุ่มสีจากกล่องสีพาสเทล
    star.style.color = colors[Math.floor(Math.random() * colors.length)];
    
    // สุ่มความเร็วในการวิ่ง (8 ถึง 15 วินาที)
    const duration = Math.random() * 7 + 8;
    star.style.animationDuration = duration + 's';
    
    container.appendChild(star);
    
    // ลบดวงดาวทิ้งเมื่อวิ่งทะลุหน้าจอไปแล้ว เพื่อไม่ให้เว็บอืด
    setTimeout(() => {
        star.remove();
    }, duration * 1000);
}

// สั่งให้ดาวเกิดใหม่ทุกๆ 400 มิลลิวินาที (ปรับตัวเลขน้อยลงถ้าอยากให้ดาวเยอะขึ้นอีก)
setInterval(createStar, 400);
</script>

</body>
</html>
